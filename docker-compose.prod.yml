services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    init: true
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      UPLOAD_STORAGE_PATH: ${UPLOAD_STORAGE_PATH:-/app/storage/uploads}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL}
      DEBUG: "False"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AUTH_BOOTSTRAP_ENABLED: ${AUTH_BOOTSTRAP_ENABLED:-false}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-12}
      AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-900}
      AUTH_PASSWORD_RESET_MAX_ATTEMPTS: ${AUTH_PASSWORD_RESET_MAX_ATTEMPTS:-6}
      AUTH_PASSWORD_RESET_WINDOW_SECONDS: ${AUTH_PASSWORD_RESET_WINDOW_SECONDS:-1800}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AI Reconciliation SaaS}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_AI_KEY: ${AZURE_AI_KEY:-}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-frontend.example.com}
    volumes:
      - upload_storage:/app/storage/uploads
    cpus: ${API_CPUS:-2}
    mem_limit: ${API_MEM_LIMIT:-2g}
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from redis import Redis; import os; Redis.from_url(os.getenv('REDIS_URL','redis://redis:6379/0')).ping()\"",
        ]
      interval: 30s
      timeout: 30s
      retries: 5
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      UPLOAD_STORAGE_PATH: ${UPLOAD_STORAGE_PATH:-/app/storage/uploads}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL}
      DEBUG: "False"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AUTH_BOOTSTRAP_ENABLED: ${AUTH_BOOTSTRAP_ENABLED:-false}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-12}
      AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-900}
      AUTH_PASSWORD_RESET_MAX_ATTEMPTS: ${AUTH_PASSWORD_RESET_MAX_ATTEMPTS:-6}
      AUTH_PASSWORD_RESET_WINDOW_SECONDS: ${AUTH_PASSWORD_RESET_WINDOW_SECONDS:-1800}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_AI_KEY: ${AZURE_AI_KEY:-}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
    volumes:
      - upload_storage:/app/storage/uploads
    cpus: ${WORKER_CPUS:-2}
    mem_limit: ${WORKER_MEM_LIMIT:-2g}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    init: true
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes: []
    cpus: ${FRONTEND_CPUS:-1}
    mem_limit: ${FRONTEND_MEM_LIMIT:-1g}
    restart: unless-stopped

volumes:
  upload_storage:
