services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: reconciliation_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-reconciliation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-reconciliation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: ./backend
    container_name: reconciliation_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dev:password@postgres:5432/reconciliation}
      DEBUG: "True"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-test-key-for-dev}
      AZURE_AI_KEY: ${AZURE_AI_KEY:-test-key-for-dev}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-https://test.api.cognitive.microsoft.com/}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: reconciliation_frontend
    ports:
      - "3001:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
