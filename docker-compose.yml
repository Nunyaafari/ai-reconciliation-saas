services:
  postgres:
    image: postgres:15-alpine
    container_name: reconciliation_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-reconciliation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-reconciliation}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reconciliation_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: reconciliation_api
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dev:password@postgres:5432/reconciliation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEBUG: "True"
      LOG_LEVEL: INFO
      LOG_JSON: "True"
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://localhost:3001}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      AUTH_BOOTSTRAP_ENABLED: ${AUTH_BOOTSTRAP_ENABLED:-false}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-AI Reconciliation SaaS}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_AI_KEY: ${AZURE_AI_KEY:-}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["sh", "/app/scripts/start.sh"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: reconciliation_worker
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://dev:password@postgres:5432/reconciliation}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEBUG: "True"
      LOG_LEVEL: INFO
      LOG_JSON: "True"
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://localhost:3001}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      AUTH_BOOTSTRAP_ENABLED: ${AUTH_BOOTSTRAP_ENABLED:-false}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_AI_KEY: ${AZURE_AI_KEY:-}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["sh", "/app/scripts/worker.sh"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: reconciliation_frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  postgres_data:
